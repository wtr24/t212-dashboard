version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: t212
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  server:
    image: wtr24dev/t212-api:latest
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/t212
      - REDIS_URL=redis://redis:6379
      - T212_API_KEY=${T212_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY}
      - PORT=5002
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  client:
    image: wtr24dev/t212-client:latest
    ports:
      - "3002:80"
    depends_on:
      - server
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 wtr24dev/t212-api wtr24dev/t212-client
    restart: unless-stopped

volumes:
  pgdata:
