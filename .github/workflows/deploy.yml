name: Build and Push to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/t212-api:latest
            ${{ secrets.DOCKER_USERNAME }}/t212-api:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/t212-client:latest
            ${{ secrets.DOCKER_USERNAME }}/t212-client:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to NAS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_SSH_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: 22
          script: |
            cd /volume1/docker/t212-dashboard
            docker compose pull
            docker compose up -d --remove-orphans
            sleep 20
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5002/api/health)
            echo "Health check: $STATUS"
            exit $([ "$STATUS" = "200" ] && echo 0 || echo 1)

      - name: Discord Notification
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then COLOR=3066993; EMOJI="✅"; else COLOR=15158332; EMOJI="❌"; fi
          MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | cut -c1-80)
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"$EMOJI Deploy $STATUS · T212 Dashboard\",\"description\":\"**$MSG**\nCommit: \`${GITHUB_SHA:0:7}\`\",\"color\":$COLOR,\"footer\":{\"text\":\"$(date -u '+%Y-%m-%d %H:%M UTC')\"}}]}" || true
